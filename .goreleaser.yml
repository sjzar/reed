    #       - CXX=/llvm-mingw/bin/aarch64-w64-mingw32-g++

upx:
  - enabled: true
    compress: best
    lzma: true

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  draft: true
  prerelease: auto
