version: 2

builds:
  - main: ./main.go
    binary: reed
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/sjzar/reed/pkg/version.Version={{ .Version }}
