name: secrets-scan

description: >
  Scan a repository or directory for accidentally committed secrets.

inputs:
  path:
    type: string
    default: "."
    description: "Directory to scan"
  include_git_history:
    type: boolean
    default: false
    description: "Also scan git history (slower)"

jobs:
  scan:
    steps:
      - id: files
        uses: shell
        run: |
          path="${{ inputs.path }}"
          echo "=== Secrets Scan: $path ==="
          echo ""

          findings=0

          check_pattern() {
            local name="$1"
            local pattern="$2"
            matches=$(grep -rn -E "$pattern" "$path" \
              --include='*.py' --include='*.js' --include='*.ts' --include='*.go' \
              --include='*.rb' --include='*.java' --include='*.yaml' --include='*.yml' \
              --include='*.json' --include='*.env' --include='*.conf' --include='*.cfg' \
              --include='*.toml' --include='*.ini' --include='*.xml' --include='*.sh' \
              --include='*.tf' --include='*.tfvars' \
              --exclude-dir='.git' --exclude-dir='node_modules' --exclude-dir='vendor' \
              --exclude-dir='.next' --exclude-dir='dist' --exclude-dir='build' \
              2>/dev/null | grep -v 'Binary file' | head -10)
            if [ -n "$matches" ]; then
              echo "--- $name ---"
              echo "$matches"
              echo ""
              findings=$((findings + $(echo "$matches" | wc -l)))
            fi
          }

          check_pattern "AWS Access Key" 'AKIA[0-9A-Z]{16}'
          check_pattern "AWS Secret Key" 'aws_secret_access_key\s*=\s*[A-Za-z0-9/+=]{40}'
          check_pattern "Generic API Key" '[Aa][Pp][Ii][-_]?[Kk][Ee][Yy]\s*[:=]\s*["\x27][A-Za-z0-9_\-]{20,}'
          check_pattern "Generic Secret" '[Ss][Ee][Cc][Rr][Ee][Tt]\s*[:=]\s*["\x27][A-Za-z0-9_\-]{10,}'
          check_pattern "Private Key" '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
          check_pattern "GitHub Token" 'gh[pousr]_[A-Za-z0-9_]{36,}'
          check_pattern "Slack Token" 'xox[baprs]-[0-9a-zA-Z-]+'
          check_pattern "Password in URL" '://[^:]+:[^@]+@'
          check_pattern "JWT Token" 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'

          # Check for sensitive files
          echo "--- Sensitive Files ---"
          find "$path" -not -path '*/.git/*' -not -path '*/node_modules/*' \
            \( -name '.env' -o -name '.env.local' -o -name '.env.production' \
            -o -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.pfx' \
            -o -name 'credentials.json' -o -name 'service-account*.json' \
            -o -name 'id_rsa' -o -name 'id_ed25519' \) \
            2>/dev/null | while read -r f; do
              echo "  $f"
              findings=$((findings + 1))
            done

          echo ""
          echo "=== Scan Complete ==="
      - id: history
        uses: shell
        run: |
          include_history="${{ inputs.include_git_history }}"
          if [ "$include_history" != "true" ]; then
            echo "(Git history scan skipped — set include_git_history=true to enable)"
            exit 0
          fi

          echo "=== Git History Scan ==="
          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            echo "Not a git repository — skipping history scan"
            exit 0
          fi

          # Check for large blobs that might be sensitive
          echo "--- Large Removed Files (possibly secrets) ---"
          git log --all --diff-filter=D --summary 2>/dev/null \
            | grep -E '\.(pem|key|p12|pfx|env)$' \
            | head -20

          echo ""
          echo "--- Commits with 'secret' or 'key' in message ---"
          git log --all --oneline --grep='secret\|password\|credential\|api.key' -i 2>/dev/null | head -10
    outputs:
      findings: ${{ steps.files.outputs.stdout }}
      history: ${{ steps.history.outputs.stdout }}

outputs:
  findings: ${{ jobs.scan.outputs.findings }}
  history: ${{ jobs.scan.outputs.history }}
